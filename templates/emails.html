<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Inbox - Spam Detector</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .email-card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .email-card:hover {
            background: #f0f4ff;
            transform: scale(1.02);
        }

        .email-text {
            margin-bottom: 10px;
            color: #333;
        }

        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn:hover {
            background: #45a049;
        }

        .back-btn {
            display: block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">
    <a href="/" class="back-btn">⬅ Back to Analyzer</a>

    <h1>📧 Your Gmail Inbox</h1>

    {% if emails %}
        {% for email in emails %}
            <div class="email-card">
                <div class="email-text">
                    {{ email }}
                </div>

                <!-- ✅ FIXED BUTTON -->
                <button class="btn" onclick="analyzeEmail(`{{ email }}`)">
                    Analyze
                </button>
            </div>
        {% endfor %}
    {% else %}
        <p>No emails found.</p>
    {% endif %}
</div>

<script>
function analyzeEmail(text) {
    fetch('/api/analyze', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {
        alert(
            data.prediction === 1
            ? "🚨 SPAM detected!"
            : "✅ SAFE email!"
        );
    })
    .catch(err => console.error(err));
}
</script>

</body>
</html>
